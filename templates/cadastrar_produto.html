{% extends "base.html" %}

{% block page_title %}Novo Produto{% endblock %}
{% block page_title_jp %}商品登録{% endblock %}

{% block topbar_actions %}
    <a href="/produtos" class="btn btn-secondary">
        <i class="ti ti-arrow-left" aria-hidden="true"></i> Voltar
    </a>
{% endblock %}

{% block conteudo %}

<div class="section-label mb-2">Cadastrar produto 　商品登録</div>

<div class="panel">
    <div class="panel-title">
        Informações do Produto
        <span class="panel-title-jp">商品情報</span>
    </div>

    <form method="POST" action="/cadastrar-produto">
        <div class="form-grid">
            <div class="form-group" style="grid-column: span 2;">
                <label for="nome">Nome do Produto</label>
                <input type="text" id="nome" name="nome"
                       placeholder="Ex: Uramaki Salmão Philadelphia" required>
            </div>
            <div class="form-group">
                <label for="preco">Preço (R$)</label>
                <input type="number" id="preco" name="preco"
                       step="0.01" min="0" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label for="estoque">Quantidade em Estoque</label>
                <input type="number" id="estoque" name="estoque"
                       min="0" placeholder="0" required>
            </div>
        </div>

        <div class="flex gap-1">
            <button type="submit" class="btn btn-primary">
                <i class="ti ti-device-floppy" aria-hidden="true"></i> Salvar Produto
            </button>
            <a href="/produtos" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

{% endblock %}
