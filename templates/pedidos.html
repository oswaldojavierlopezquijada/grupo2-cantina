{% extends "base.html" %}

{% block conteudo %}
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h1 style="margin: 0;">🛒 Registrar Novo Pedido</h1>
    <a href="/pedidos" style="text-decoration: none; color: #3498db; font-weight: bold; font-size: 14px;">
      ← Voltar para Pedidos
    </a>
  </div>

  {# Exibe a mensagem de erro caso o estoque seja insuficiente #}
  {% if erro %}
    <div class="alert-danger" style="background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 15px; border-radius: 6px; margin-bottom: 20px; font-weight: 500;">
      ⚠️ {{ erro }}
    </div>
  {% endif %}

  <div class="card" style="padding: 30px; max-width: 500px; margin: 0 auto;">
    <form action="/novo-pedido" method="POST">
      
      <div style="margin-bottom: 20px;">
        <label for="produto_id" style="display: block; margin-bottom: 8px; font-weight: bold; color: #2c3e50;">
          Selecione o Produto:
        </label>
        <select name="produto_id" id="produto_id" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; background-color: #fff;">
          <option value="" disabled selected>Escolha um produto disponível...</option>
          {% for produto in produtos %}
            {# produto[0] = id, produto[1] = nome, produto[2] = estoque #}
            <option value="{{ produto[0] }}">
              {{ produto[1] }} (Estoque: {{ produto[2] }})
            </option>
          {% endfor %}
        </select>
      </div>

      <div style="margin-bottom: 20px;">
        <label for="quantidade" style="display: block; margin-bottom: 8px; font-weight: bold; color: #2c3e50;">
          Quantidade desejada:
        </label>
        <input type="number" name="quantidade" id="quantidade" min="1" required placeholder="Ex: 2" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; box-sizing: border-box;">
      </div>

      <button type="submit" style="width: 100%; padding: 12px; background-color: #2e7d32; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s;">
        Confirmar Pedido
      </button>

    </form>
  </div>
{% endblock %}
