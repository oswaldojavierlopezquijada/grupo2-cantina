<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍔 Cantina Digital</title>
    <style>
        /* Estilos Gerais */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
        }

        /* Barra Lateral de Navegação */
        .sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .sidebar h2 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-align: center;
        }
        .sidebar a {
            display: block;
            color: #ecf0f1;
            text-decoration: none;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .sidebar a:hover {
            background-color: #34495e;
        }

        /* Conteúdo Principal */
        .container {
            flex: 1;
            padding: 40px;
            box-sizing: border-box;
            max-width: 1200px;
        }

        h1 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 2.2rem;
        }

        /* Layout de Cards (Dashboard) */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #e67e22; /* Detalhe em laranja/cantina */
        }

        .card h2 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            color: #2c3e50;
        }

        .card p {
            margin: 0;
            color: #7f8c8d;
            font-weight: 500;
        }

        /* Alertas de Estoque */
        .alerta {
            background-color: #fde8e8;
            border: 1px solid #f8b4b4;
            color: #9b1c1c;
            padding: 15px 20px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 0.95rem;
        }

        /* Ajustes finos para inputs dentro do card de formulário */
        .form-group input focus {
            outline: none;
            border-color: #e67e22 !important;
            box-shadow: 0 0 5px rgba(230, 126, 34, 0.3);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Dashboard</h2>
        <a href="/">🏠 Início</a>
        <a href="/produtos">📦 Ver Produtos</a>
        <a href="/cadastrar-produto">➕ Novo Produto</a>
        <a href="/pedidos">📋 Pedidos</a>
        <a href="/historico_pedidos">📜 Histórico de Pedidos</a>
    </div>

    <div class="container">
        {% block conteudo %}
        {% endblock %}
    </div>

</body>
</html>
