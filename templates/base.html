<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍣 Sushi Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #faf8f5;
            color: #1a1a1a;
            display: flex;
            font-size: 14px;
            line-height: 1.6;
        }
        a { text-decoration: none; color: inherit; }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 220px; min-width: 220px;
            background-color: #0d0d0d;
            min-height: 100vh;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }
        .sidebar::before {
            content: ''; position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background-color: #c0392b; z-index: 1;
        }
        .sidebar::after {
            content: '寿'; position: absolute;
            bottom: -10px; right: -10px;
            font-family: 'Noto Serif JP', serif;
            font-size: 120px; color: rgba(255,255,255,0.03);
            line-height: 1; pointer-events: none; user-select: none;
        }
        .sidebar-logo {
            padding: 28px 20px 22px;
            border-bottom: 1px solid #1e1e1e;
        }
        .logo-kanji {
            font-family: 'Noto Serif JP', serif;
            font-size: 20px; color: #fff;
            letter-spacing: 6px; display: block; margin-bottom: 4px;
        }
        .logo-name {
            font-size: 10px; letter-spacing: 3px;
            color: #c0392b; text-transform: uppercase;
            display: block; font-weight: 500;
        }
        .nav-section-label {
            font-size: 9px; letter-spacing: 3px;
            color: #3a3a3a; text-transform: uppercase;
            padding: 20px 20px 8px; display: block; user-select: none;
        }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 11px 20px; color: #888;
            font-size: 13px; cursor: pointer;
            transition: background .15s, color .15s, border-color .15s;
            border-left: 2px solid transparent;
        }
        .nav-item i { font-size: 16px; opacity: .7; transition: opacity .15s; flex-shrink: 0; }
        .nav-item:hover { background: #161616; color: #fff; border-left-color: #c0392b; }
        .nav-item:hover i { opacity: 1; }
        .nav-item.active { background: #1a1a1a; color: #fff; border-left-color: #c0392b; }
        .nav-item.active i { opacity: 1; }
        .nav-divider { height: 1px; background: #1c1c1c; margin: 8px 20px; }
        .sidebar-footer {
            margin-top: auto; padding: 16px 20px;
            border-top: 1px solid #1a1a1a; text-align: center;
        }
        .sidebar-footer-kamon { font-size: 18px; color: rgba(255,255,255,.07); display: block; margin-bottom: 4px; user-select: none; }
        .sidebar-footer-text { font-size: 9px; letter-spacing: 2px; color: #2e2e2e; font-family: 'Noto Serif JP', serif; }

        /* ── MAIN ── */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        .topbar {
            background: #fff; border-bottom: 1px solid #ede9e2;
            padding: 14px 32px; display: flex; align-items: center;
            justify-content: space-between; flex-shrink: 0;
        }
        .topbar-title { font-family: 'Noto Serif JP', serif; font-size: 16px; color: #111; letter-spacing: 1px; }
        .topbar-subtitle { font-size: 10px; letter-spacing: 2.5px; color: #c0392b; margin-top: 1px; }
        .topbar-actions { display: flex; align-items: center; gap: 14px; }
        .topbar-icon { font-size: 18px; color: #bbb; cursor: pointer; transition: color .15s; }
        .topbar-icon:hover { color: #c0392b; }
        .content-area { flex: 1; padding: 32px 32px 40px; }

        /* ── TIPOGRAFIA ── */
        .section-label {
            font-size: 10px; letter-spacing: 3px; color: #999;
            text-transform: uppercase; margin-bottom: 12px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-label::after { content: ''; flex: 1; height: 1px; background: #ede9e2; }

        /* ── METRIC CARDS ── */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 14px; margin-bottom: 28px; }
        .metric-card {
            background: #fff; border: 0.5px solid #e8e3db;
            border-radius: 8px; padding: 20px 22px;
            position: relative; overflow: hidden;
        }
        .metric-card[data-jp]::after {
            content: attr(data-jp); position: absolute;
            right: 12px; bottom: 6px;
            font-family: 'Noto Serif JP', serif;
            font-size: 32px; color: rgba(0,0,0,.04);
            line-height: 1; pointer-events: none; user-select: none;
        }
        .metric-label { font-size: 9px; letter-spacing: 2.5px; color: #aaa; text-transform: uppercase; margin-bottom: 10px; }
        .metric-value { font-family: 'Noto Serif JP', serif; font-size: 28px; color: #111; font-weight: 700; line-height: 1; margin-bottom: 6px; }
        .metric-delta { font-size: 11px; display: flex; align-items: center; gap: 3px; }
        .metric-delta.up   { color: #27ae60; }
        .metric-delta.down { color: #c0392b; }
        .metric-card.accent { background: #c0392b; border-color: #c0392b; }
        .metric-card.accent .metric-label { color: rgba(255,255,255,.55); }
        .metric-card.accent .metric-value { color: #fff; }
        .metric-card.accent .metric-delta { color: rgba(255,255,255,.7); }
        .metric-card.accent[data-jp]::after { color: rgba(255,255,255,.06); }

        /* ── TABELAS ── */
        .data-table-wrap { background: #fff; border: 0.5px solid #e8e3db; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        .data-table-header { padding: 14px 20px; border-bottom: 1px solid #f2ede6; display: flex; align-items: center; justify-content: space-between; }
        .data-table-header .table-title { font-size: 12px; letter-spacing: 1.5px; color: #555; text-transform: uppercase; }
        .data-table-header .table-action { font-size: 11px; color: #c0392b; cursor: pointer; letter-spacing: .5px; }
        .data-table-header .table-action:hover { opacity: .7; }
        table.sushi-table { width: 100%; border-collapse: collapse; }
        table.sushi-table thead th { padding: 10px 20px; text-align: left; font-size: 9px; letter-spacing: 2px; color: #aaa; text-transform: uppercase; background: #faf8f5; border-bottom: 1px solid #f0ebe3; font-weight: 500; }
        table.sushi-table tbody td { padding: 13px 20px; font-size: 13px; color: #333; border-bottom: 0.5px solid #f5f0eb; }
        table.sushi-table tbody tr:last-child td { border-bottom: none; }
        table.sushi-table tbody tr:hover td { background: #fdf9f6; }
        .empty-state { text-align: center; padding: 36px 20px; color: #aaa; font-size: 13px; }
        .empty-state i { font-size: 28px; display: block; margin-bottom: 8px; }

        /* ── ALERTAS ── */
        .alert { padding: 12px 16px; border-radius: 0 6px 6px 0; display: flex; align-items: flex-start; gap: 10px; font-size: 13px; margin-bottom: 16px; border-left: 3px solid transparent; }
        .alert i { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
        .alert.danger  { background: #fff5f5; border: 0.5px solid #f7c1c1; border-left: 3px solid #c0392b; color: #7f1d1d; }
        .alert.danger i { color: #c0392b; }
        .alert.success { background: #f0fdf4; border: 0.5px solid #bbf7d0; border-left: 3px solid #16a34a; color: #14532d; }
        .alert.success i { color: #16a34a; }
        .alert.warning { background: #fffbeb; border: 0.5px solid #fde68a; border-left: 3px solid #d97706; color: #78350f; }
        .alert.warning i { color: #d97706; }

        /* ── FORMULÁRIOS ── */
        .panel { background: #fff; border: 0.5px solid #e8e3db; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
        .panel-title { font-family: 'Noto Serif JP', serif; font-size: 14px; color: #111; letter-spacing: 1px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #f0ebe3; display: flex; align-items: center; justify-content: space-between; }
        .panel-title-jp { font-size: 10px; letter-spacing: 2px; color: #c0392b; font-family: 'Noto Sans JP', sans-serif; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 16px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 10px; letter-spacing: 2px; color: #999; text-transform: uppercase; font-weight: 500; }
        .form-group input,
        .form-group select,
        .form-group textarea {
            background: #fff; border: 0.5px solid #ddd8d0; border-radius: 4px;
            padding: 9px 12px; font-size: 13px; color: #1a1a1a;
            font-family: 'Noto Sans JP', sans-serif;
            transition: border-color .15s, box-shadow .15s; outline: none; width: 100%;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus { border-color: #c0392b; box-shadow: 0 0 0 3px rgba(192,57,43,.1); }
        .form-group textarea { resize: vertical; min-height: 80px; }

        /* ── BOTÕES ── */
        .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 1px; text-transform: uppercase; border-radius: 4px; cursor: pointer; transition: all .15s; border: 0.5px solid transparent; font-weight: 500; }
        .btn-primary   { background: #c0392b; color: #fff; border-color: #c0392b; }
        .btn-primary:hover { background: #a93226; border-color: #a93226; }
        .btn-secondary { background: transparent; color: #555; border-color: #ddd8d0; }
        .btn-secondary:hover { background: #f5f0eb; color: #111; }
        .btn-ghost     { background: transparent; color: #c0392b; border-color: transparent; }
        .btn-ghost:hover { background: #fff5f5; }

        /* ── UTILITÁRIOS ── */
        .text-muted  { color: #999; }
        .text-danger { color: #c0392b; }
        .text-sm     { font-size: 11px; }
        .text-xs     { font-size: 10px; letter-spacing: 1px; }
        .mt-1 { margin-top: 8px; }  .mt-2 { margin-top: 16px; } .mt-3 { margin-top: 24px; }
        .mb-1 { margin-bottom: 8px; } .mb-2 { margin-bottom: 16px; } .mb-3 { margin-bottom: 24px; }
        .flex { display: flex; }
        .flex-between { display: flex; align-items: center; justify-content: space-between; }
        .gap-1 { gap: 8px; } .gap-2 { gap: 16px; }

        @media (max-width: 768px) {
            .sidebar { width: 60px; min-width: 60px; }
            .nav-item span, .nav-section-label, .logo-name, .sidebar-footer-text { display: none; }
            .logo-kanji { font-size: 16px; letter-spacing: 2px; }
            .sidebar-logo { padding: 20px 10px 16px; text-align: center; }
            .nav-item { padding: 12px; justify-content: center; }
            .nav-item i { font-size: 18px; }
            .content-area { padding: 20px 16px; }
            .topbar { padding: 12px 16px; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <span class="logo-kanji">寿 司 屋</span>
        <span class="logo-name">Sushi Digital</span>
    </div>

    <span class="nav-section-label">Menu 　メニュー</span>

    <a href="/" class="nav-item {{ 'active' if request.path == '/' }}">
        <i class="ti ti-layout-dashboard" aria-hidden="true"></i>
        <span>Início</span>
    </a>
    <a href="/produtos" class="nav-item {{ 'active' if request.path == '/produtos' }}">
        <i class="ti ti-box" aria-hidden="true"></i>
        <span>Ver Produtos</span>
    </a>
    <a href="/cadastrar-produto" class="nav-item {{ 'active' if request.path == '/cadastrar-produto' }}">
        <i class="ti ti-plus" aria-hidden="true"></i>
        <span>Novo Produto</span>
    </a>

    <div class="nav-divider"></div>
    <span class="nav-section-label">Pedidos 　注文</span>

    <a href="/pedidos" class="nav-item {{ 'active' if request.path == '/pedidos' }}">
        <i class="ti ti-clipboard-list" aria-hidden="true"></i>
        <span>Pedidos</span>
    </a>
    <a href="/novo-pedido" class="nav-item {{ 'active' if request.path == '/novo-pedido' }}">
        <i class="ti ti-shopping-cart-plus" aria-hidden="true"></i>
        <span>Novo Pedido</span>
    </a>

    <div class="sidebar-footer">
        <span class="sidebar-footer-kamon">◉</span>
        <span class="sidebar-footer-text">注文管理 · v2.0</span>
    </div>
</aside>

<div class="main-wrapper">
    <header class="topbar">
        <div>
            <div class="topbar-title">{% block page_title %}Painel{% endblock %}</div>
            <div class="topbar-subtitle">{% block page_title_jp %}{% endblock %}</div>
        </div>
        <div class="topbar-actions">
            {% block topbar_actions %}{% endblock %}
        </div>
    </header>
    <main class="content-area">
        {% block conteudo %}{% endblock %}
    </main>
</div>

</body>
</html>
